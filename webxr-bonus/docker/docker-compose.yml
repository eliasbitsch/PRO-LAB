services:
  webxr:
    build:
      # Build context = project root so the Dockerfile can copy web/ AND bridge/
      context: ..
      dockerfile: docker/Dockerfile
    image: prolab-webxr:jazzy
    container_name: prolab_webxr
    hostname: prolab-webxr
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    restart: unless-stopped
