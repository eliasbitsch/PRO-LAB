services:
  prolab:
    build:
      context: .
      dockerfile: Dockerfile
      # USER_UID/USER_GID come from docker/.env (auto-loaded by compose).
      # That file pins them to the host user's IDs so bind-mounts (./results,
      # ws/src) are owned consistently — no chmod 777 dance.
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: prolab:jazzy
    container_name: prolab_jazzy
    hostname: prolab
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - TURTLEBOT4_MODEL=standard
      - DISPLAY=${DISPLAY:-:1}
      - XDG_RUNTIME_DIR=/tmp/runtime-ros
      # gz runs inside this container (start_gz:=true in the master launch).
      # Partition keeps gz-transport scoped to this stack.
      - GZ_PARTITION=prolab
      - GZ_IP=127.0.0.1
      # NVIDIA GPU passthrough (compute + offscreen rendering). See the
      # rendering split below.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Rendering is split by graphics API, because this is a Wayland+Optimus
      # host (Intel iGPU drives the XWayland :1 server; NVIDIA dGPU is offload):
      #
      #   GUI windows (RViz, gz GUI client) use *GLX* on the XWayland :1 server,
      #   which is Mesa-backed -> they render on the Intel iGPU. We must NOT
      #   force the NVIDIA GLX vendor here: under XWayland forcing libGLX_nvidia
      #   yields `GLXBadFBConfig` and gz crashes. So no __GLX_VENDOR / zink
      #   overrides (those were WSL-era hacks). Needs `xhost +local:` once.
      #
      #   Offscreen sensor rendering (gz `--headless-rendering`: the ogre2
      #   render thread for gpu_lidar/camera) uses *EGL*. We pin the EGL vendor
      #   to NVIDIA so the heavy raycasting/camera rendering in the headless
      #   batch sweeps runs on the dGPU. Verified: gz loads gz-rendering-ogre2
      #   and inits the render context on the NVIDIA EGL device (/dev/dri/card1)
      #   with no GLX crash. __EGL_VENDOR_LIBRARY_FILENAMES affects only EGL
      #   consumers, so the GLX GUI path above is untouched.
      - __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
    # Pass the host's render-node device into the container. nvidia-container
    # -toolkit handles /dev/nvidia*, but Gazebo also touches /dev/dri/* via
    # Mesa probes, so we mount it explicitly for fallback paths.
    devices:
      - /dev/dri:/dev/dri
    # Add the host's render group GID to the in-container user so it can
    # access /dev/dri/renderD128 (which is rw for group only). HOST_RENDER_GID
    # is set in docker/.env to match `getent group render` on the host.
    group_add:
      - "${HOST_RENDER_GID:-110}"
      - "${HOST_VIDEO_GID:-44}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, graphics, utility, video, display]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../ws/src:/home/ros/ws/src
      # Bind-mount the results dir so csv_logger writes land directly on the
      # host repo (./results/). Saves the docker-cp dance after every sweep.
      - ../results:/home/ros/results:rw
      - prolab_build:/home/ros/ws/build
      - prolab_install:/home/ros/ws/install
      - prolab_log:/home/ros/ws/log
      - prolab_gz_cache:/home/ros/.gz
    command: bash

volumes:
  prolab_build:
  prolab_install:
  prolab_log:
  prolab_gz_cache:
