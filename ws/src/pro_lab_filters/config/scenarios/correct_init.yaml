# Baseline: filter is initialized AT the truth, with a small spread.
# Should converge immediately.
# Truth start matches nav2_minimal_tb4_sim warehouse default spawn so that
# /scan aligns with /map: x=-8.0, y=-0.5, yaw=0.
/**:
  ros__parameters:
    init_distribution: gaussian
    init_x:       -8.00
    init_y:       -0.50
    init_yaw:      0.00
    init_spread_xy:  0.10   # tight (10 cm) — confident
    init_spread_yaw: 0.05   # ~3°
    init_cov:        0.01   # KF/EKF P0 diagonal
    num_particles:   500
